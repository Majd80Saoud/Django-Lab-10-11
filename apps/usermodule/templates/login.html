<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h1>Login Page</h1>

    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username">

        <br><br>

        <input type="password" name="password" placeholder="Password">

        <br><br>

        <button type="submit">Login</button>
    </form>

    <br>

    <a href="/users/register/">Register</a>

</body>
</html>
