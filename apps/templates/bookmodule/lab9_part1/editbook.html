<h1>Edit Book - Part 1</h1>

<form method="post">
    {% csrf_token %}

    <label>Title:</label>
    <input type="text" name="title" value="{{ book.title }}">
    <br><br>

    <label>Author:</label>
    <input type="text" name="author" value="{{ book.author }}">
    <br><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price" value="{{ book.price }}">
    <br><br>

    <label>Edition:</label>
    <input type="number" name="edition" value="{{ book.edition }}">
    <br><br>

    <button type="submit">Update</button>
</form>

<br>
<a href="{% url 'list_books_part1' %}">Back</a>
