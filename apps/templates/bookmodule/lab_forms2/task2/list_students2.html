<h1>Students List - Task 2</h1>

<a href="{% url 'add_student2' %}">Add Student</a>

<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Addresses</th>
        <th>Actions</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.age }}</td>
        <td>
            {% for address in student.addresses.all %}
                {{ address.city }}<br>
            {% endfor %}
        </td>
        <td>
            <a href="{% url 'edit_student2' student.id %}">Edit</a>
            |
            <a href="{% url 'delete_student2' student.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
